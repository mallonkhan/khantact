<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallon Khan</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --tv-accent: #f59e0b; /* Golden Knob Color */
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 380px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background-image: url('IMG_8025.JPG'); 
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        .menu-item {
            position: absolute;
            text-decoration: none;
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--accent-color);
            transition: 0.3s;
            z-index: 5;
        }

        .menu-item:hover { background: var(--accent-color); color: var(--bg-color); }

        .btn-1 { transform: translate(150px, 0px); }
        .btn-2 { transform: translate(110px, 110px); }
        .btn-3 { transform: translate(0px, 150px); }
        .btn-4 { transform: translate(-110px, 110px); }
        .btn-5 { transform: translate(-150px, 0px); }
        .btn-6 { transform: translate(-110px, -110px); }
        .btn-7 { transform: translate(0px, -150px); }
        .btn-8 { transform: translate(110px, -110px); }

        /* --- TV SECTION --- */
        .tv-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            background: #1e293b; /* TV Body Color */
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: row; /* Layout: Screen on Left, Controls on Right */
            gap: 15px;
            align-items: center;
        }

        .screen-area {
            position: relative;
            flex: 3; /* Takes up most of the space */
            aspect-ratio: 4/3;
            background: #000;
            border: 10px solid #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        #channel-display {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #22c55e;
            font-family: monospace;
            font-size: 14px;
            z-index: 30;
            text-shadow: 0 0 5px #22c55e;
        }

        .channel {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .current-channel { display: flex; }

        /* --- CONTROL PANEL --- */
        .controls-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tv-btn {
            background: #475569;
            color: white;
            border: 2px solid var(--tv-accent);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            width: 80px;
        }

        .tv-btn:active { transform: scale(0.95); }

        .power-light {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        @media (max-width: 500px) {
            .tv-wrapper { flex-direction: column; }
            .controls-area { flex-direction: row; width: 100%; justify-content: space-around; }
            .profile-container { transform: scale(0.8); height: 300px; }
        }
    </style>
</head>
