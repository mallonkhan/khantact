<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallon Khan | Khan-O-Vision</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 380px; 
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background-image: url('IMG_8025.JPG'); 
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        .menu-item {
            position: absolute;
            text-decoration: none;
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--accent-color);
            transition: 0.3s;
            z-index: 5;
        }

        .menu-item:hover { background: var(--accent-color); color: var(--bg-color); }

        .btn-1 { transform: translate(150px, 0px); }
        .btn-2 { transform: translate(110px, 110px); }
        .btn-3 { transform: translate(0px, 150px); }
        .btn-4 { transform: translate(-110px, 110px); }
        .btn-5 { transform: translate(-150px, 0px); }
        .btn-6 { transform: translate(-110px, -110px); }
        .btn-7 { transform: translate(0px, -150px); }
        .btn-8 { transform: translate(110px, -110px); }

        /* --- TV SECTION --- */
        .tv-frame {
            position: relative;
            width: 100%;
            max-width: 850px;
            margin-top: 20px;
        }

        .tv-img {
            width: 100%;
            display: block;
            position: relative;
            z-index: 20;
            pointer-events: none;
        }

        .screen-container {
            position: absolute;
            top: 10.5%; 
            left: 5.5%;
            width: 70%;
            height: 73%;
            background: #000;
            z-index: 10;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .channel {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            padding: 10px;
            box-sizing: border-box;
        }

        .current-channel { display: flex; }

        #ch-display {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #22c55e;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            text-shadow: 0 0 8px #22c55e;
