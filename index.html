<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallon Khan</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --tv-accent: #f59e0b;
        }

        body {
            /* Replace 'bg.jpg' with your background image filename */
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Aligns content from top down */
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 450px; /* Space for the button circle */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background-image: url('IMG_8025.JPG'); 
            background-size: cover;
            background-position: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .menu-item {
            position: absolute;
            text-decoration: none;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--accent-color);
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 5;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* Responsive Circle Math */
        .btn-1 { transform: translate(160px, 0px); }
        .btn-2 { transform: translate(115px, 115px); }
        .btn-3 { transform: translate(0px, 160px); }
        .btn-4 { transform: translate(-115px, 115px); }
        .btn-5 { transform: translate(-160px, 0px); }
        .btn-6 { transform: translate(-115px, -115px); }
        .btn-7 { transform: translate(0px, -160px); }
        .btn-8 { transform: translate(115px, -115px); }

        /* --- TV GALLERY SECTION --- */
