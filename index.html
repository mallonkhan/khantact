<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallon Khan</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --tv-accent: #f59e0b;
        }

        body {
            /* Replace 'bg.jpg' with your background image filename */
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Aligns content from top down */
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 450px; /* Space for the button circle */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background-image: url('IMG_8025.JPG'); 
            background-size: cover;
            background-position: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .menu-item {
            position: absolute;
            text-decoration: none;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--accent-color);
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 5;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* Responsive Circle Math */
        .btn-1 { transform: translate(160px, 0px); }
        .btn-2 { transform: translate(115px, 115px); }
        .btn-3 { transform: translate(0px, 160px); }
        .btn-4 { transform: translate(-115px, 115px); }
        .btn-5 { transform: translate(-160px, 0px); }
        .btn-6 { transform: translate(-115px, -115px); }
        .btn-7 { transform: translate(0px, -160px); }
        .btn-8 { transform: translate(115px, -115px); }

        /* --- TV GALLERY SECTION --- */
        .tv-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px; /* Main attraction size */
            aspect-ratio: 4 / 3;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tv-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 20;
            pointer-events: none;
        }

        .tv-screen-content {
            position: absolute;
            /* Adjust these % values to line up your video with the specific TV image hole */
            top: 12%; 
            left: 11%;
            width: 65%;
            height: 68%;
            background-color: black;
            overflow: hidden;
            z-index: 10;
        }

        .channel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .current-channel { display: flex; }

        .tv-controls {
            position: absolute;
            right: 5%;
            bottom: 15%;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tv-knob {
            background: #334155;
            color: #f8fafc;
            border: 2px solid var(--tv-accent);
            padding: 8px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tv-knob:hover {
            background: var(--tv-accent);
            color: black;
        }

        /* Mobile Fixes */
        @media (max-width: 600px) {
            .profile-container { transform: scale(0.7); height: 350px; }
            .tv-wrapper { width: 95vw; }
            .menu-item { font-size: 11px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-pic"></div>
        <a href="https://a.co/d/e8ejB2f" class="menu-item btn-1">Emplant</a>
        <a href="https://a.co/d/4FbutND" class="menu-item btn-2">Black Dove</a>
        <a href="https://substack.com/@khannections" class="menu-item btn-3">Substack</a>
        <a href="#" class="menu-item btn-4">About</a>
        <a href="https://khanimations.printful.me/" class="menu-item btn-5">Store</a>
        <a href="https://mallon.bandcamp.com/" class="menu-item btn-6">Music</a>
        <a href="https://podcasts.apple.com/us/podcast/dantes-history/id1147372266" class="menu-item btn-7">Dante's History</a>
        <a href="https://youtu.be/eOkfrJ5i_l8" class="menu-item btn-8">Animations</a>
    </div>

    <div class="tv-wrapper">
        <img src="tv-bezel.png" alt="TV Frame" class="tv-mask">
        
        <div class="tv-screen-content">
            <div class="channel current-channel">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/eOkfrJ5i_l8" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="channel">
                <iframe style="border: 0; width: 100%; height: 100%;" src="src="https://bandcamp.com/EmbeddedPlayer/album=2607510681/size=small/bgcol=ffffff/linkcol=0687f5/transparent=true/" seamless><a href="https://mallon.bandcamp.com/album/khantact">KHANTACT by Khan!</a></iframe>
            </div>

            <div class="channel">
                <img src="https://media.giphy.com/media/xTk9ZvMnbY0zVb19nE/giphy.gif" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </div>

        <div class="tv-controls">
            <button onclick="changeChannel(1)" class="tv-knob">CH +</button>
            <button onclick="changeChannel(-1)" class="tv-knob">CH -</button>
        </div>
    </div>

    <script>
        let currentChannelIndex = 0;
        const channels = document.querySelectorAll('.channel');

        function changeChannel(direction) {
            channels[currentChannelIndex].classList.remove('current-channel');
            currentChannelIndex = (currentChannelIndex + direction + channels.length) % channels.length;
            channels[currentChannelIndex].classList.add('current-channel');
        }
    </script>

</body>
</html>
