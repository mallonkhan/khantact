    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            /* Adaptive sizes */
            --circle-size: 180px; 
            --distance: 180px; 
        }

        body {
            /* BACKGROUND IMAGE ADDED HERE */
            background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('iStock-96203609.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(1); /* Default scale */
        }

        /* Profile Picture Fix */
        .profile-pic {
            width: var(--circle-size);
            height: var(--circle-size);
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            /* CASE SENSITIVE FIX: Ensure this exactly matches the file name in GitHub */
            background-image: url('IMG_8025.JPG');  
            background-size: cover;
            background-position: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        .menu-item {
            position: absolute;
            text-decoration: none;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--accent-color);
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 5;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* Responsive Scaling for Mobile */
        @media (max-width: 600px) {
            .container {
                transform: scale(0.65); /* Shrinks the whole circle for small screens */
            }
            .cd-player-container {
                width: 95% !important;
            }
        }

        /* Circle Positioning */
        .btn-1 { transform: translate(calc(var(--distance) * cos(0deg)),   calc(var(--distance) * sin(0deg))); }
        .btn-2 { transform: translate(calc(var(--distance) * cos(45deg)),  calc(var(--distance) * sin(45deg))); }
        .btn-3 { transform: translate(calc(var(--distance) * cos(90deg)),  calc(var(--distance) * sin(90deg))); }
        .btn-4 { transform: translate(calc(var(--distance) * cos(135deg)), calc(var(--distance) * sin(135deg))); }
        .btn-5 { transform: translate(calc(var(--distance) * cos(180deg)), calc(var(--distance) * sin(180deg))); }
        .btn-6 { transform: translate(calc(var(--distance) * cos(225deg)), calc(var(--distance) * sin(225deg))); }
        .btn-7 { transform: translate(calc(var(--distance) * cos(270deg)), calc(var(--distance) * sin(270deg))); }
        .btn-8 { transform: translate(calc(var(--distance) * cos(315deg)), calc(var(--distance) * sin(315deg))); }

        /* CD PLAYER WIDGET STYLING */
        .cd-player-container {
            position: fixed;
            bottom: 20px;
            width: 400px;
            background: #1e293b;
            border: 3px solid #64748b;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>

<style>
    :root {
        /* ... previous roots ... */
        --tv-accent: #f59e0b; /* Golden knob color */
    }

    /* Add to your CSS section */
    .tv-gallery-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 320px;
        height: 280px;
        z-index: 100;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        background: #1e293b; /* Fallback screen color */
        border-radius: 15px; /* So the shadow respects the TV shape */
    }

    /* The masking PNG sits in front */
    .tv-mask {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 20;
        pointer-events: none; /* Allows user to click "through" the bezel to the content */
    }

    /* The container for the embed codes */
    .tv-screen-content {
        position: absolute;
        top: 30px; /* Adjust these values so the content lines up with the screen hole in your PNG */
        left: 30px; 
        width: 200px; /* Adjust these values to match the size of your screen hole */
        height: 180px; 
        background-color: black;
        overflow: hidden;
        z-index: 10;
        border-radius: 5px;
    }

    /* Base styling for each channel's embed */
    .channel {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none; /* Hide all channels by default */
        justify-content: center;
        align-items: center;
    }

    /* Only show the current channel */
    .current-channel {
        display: flex;
    }

    /* Make sure all embeds fill the channel container */
    .channel iframe, .channel video, .channel img {
        width: 100%;
        height: 100%;
        border: 0;
    }

    /* Styling the channel surfing buttons */
    .tv-controls {
        position: absolute;
        bottom: 10px;
        right: 15px;
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .tv-knob {
        background: #475569;
        color: #f8fafc;
        border: 2px solid var(--tv-accent);
        padding: 5px 10px;
        border-radius: 5px;
        font-family: monospace;
        font-size: 10px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s;
    }

    .tv-knob:hover {
        background: var(--tv-accent);
        color: var(--bg-color);
        box-shadow: 0 0 10px var(--tv-accent);
    }

    /* Small Mobile Adjustment */
    @media (max-width: 600px) {
        .tv-gallery-container {
            width: 250px;
            height: 220px;
            bottom: 10px;
            right: 10px;
        }
        /* You will need to make mobile-specific top/left/width/height adjustments for .tv-screen-content here based on your mobile-resized PNG */
    }
</style>

<script>
    let currentChannelIndex = 0;
    const channels = document.querySelectorAll('.channel');

    function changeChannel(direction) {
        // 1. Fade/Hide current channel
        channels[currentChannelIndex].classList.remove('current-channel');

        // 2. Calculate next channel index (loops around)
        currentChannelIndex = (currentChannelIndex + direction + channels.length) % channels.length;

        // 3. Show new channel
        channels[currentChannelIndex].classList.add('current-channel');
    }
</script>
