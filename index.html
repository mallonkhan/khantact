<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallon Khan</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --circle-size: 200px; /* Size of your profile pic */
            --button-distance: 160px; /* How far buttons sit from center */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Profile Picture */
        .profile-pic {
            width: var(--circle-size);
            height: var(--circle-size);
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background-image: url('IMG_8025.JPG'); /* REPLACE WITH YOUR IMAGE URL */
            background-size: cover;
            background-position: center;
            z-index: 10;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        /* The Buttons Wrapper */
        .menu-item {
            position: absolute;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: scale(1.1);
        }

        /* Positioning the 8 buttons in a circle */
        /* Formula: x = cos(angle), y = sin(angle) */
        .btn-1 { transform: translate(calc(var(--button-distance) * cos(0deg)),   calc(var(--button-distance) * sin(0deg))); }
        .btn-2 { transform: translate(calc(var(--button-distance) * cos(45deg)),  calc(var(--button-distance) * sin(45deg))); }
        .btn-3 { transform: translate(calc(var(--button-distance) * cos(90deg)),  calc(var(--button-distance) * sin(90deg))); }
        .btn-4 { transform: translate(calc(var(--button-distance) * cos(135deg)), calc(var(--button-distance) * sin(135deg))); }
        .btn-5 { transform: translate(calc(var(--button-distance) * cos(180deg)), calc(var(--button-distance) * sin(180deg))); }
        .btn-6 { transform: translate(calc(var(--button-distance) * cos(225deg)), calc(var(--button-distance) * sin(225deg))); }
        .btn-7 { transform: translate(calc(var(--button-distance) * cos(270deg)), calc(var(--button-distance) * sin(270deg))); }
        .btn-8 { transform: translate(calc(var(--button-distance) * cos(315deg)), calc(var(--button-distance) * sin(315deg))); }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-pic"></div>

        <a href="#" class="menu-item btn-1">Music</a>
        <a href="#" class="menu-item btn-2">Books</a>
        <a href="#" class="menu-item btn-3">Artwork</a>
        <a href="#" class="menu-item btn-4">Blog</a>
        <a href="#" class="menu-item btn-5">Store</a>
        <a href="#" class="menu-item btn-6">About</a>
        <a href="#" class="menu-item btn-7">Contact</a>
        <a href="#" class="menu-item btn-8">Gallery</a>
    </div>

</body>
</html>
