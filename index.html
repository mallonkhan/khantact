<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallon Khan</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --tv-accent: #f59e0b;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            background-image: url('IMG_8025.JPG'); 
            background-size: cover;
            background-position: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .menu-item {
            position: absolute;
            text-decoration: none;
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--accent-color);
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 5;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* Button Positions */
        .btn-1 { transform: translate(160px, 0px); }
        .btn-2 { transform: translate(115px, 115px); }
        .btn-3 { transform: translate(0px, 160px); }
        .btn-4 { transform: translate(-115px, 115px); }
        .btn-5 { transform: translate(-160px, 0px); }
        .btn-6 { transform: translate(-115px, -115px); }
        .btn-7 { transform: translate(0px, -160px); }
        .btn-8 { transform: translate(115px, -115px); }

        /* --- TV GALLERY SECTION --- */
        .tv-wrapper {
            position: relative;
            width: 100%;
            max-width: 650px;
            aspect-ratio: 4 / 3;
            margin-top: 20px;
        }

        .tv-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 20;
            pointer-events: none;
        }

        .tv-screen-content {
            position: absolute;
            top: 11%; 
            left: 10%;
            width: 66%;
            height: 68%;
            background-color: black;
            overflow-y: auto; /* Allows scrolling for long TikToks or Podcasts */
            overflow-x: hidden;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Channel Number Display */
        #channel-info {
            position: absolute;
            top: 15px;
            right: 130px;
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 2px 8px;
            font-size: 14px;
            border-radius: 3px;
            z-index: 25;
            pointer-events: none;
        }

        .channel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .current-channel { display: flex; }

        /* Ensure all embeds are centered */
        .channel iframe, .channel blockquote {
            max-width: 100% !important;
            margin: auto !important;
        }

        .tv-controls {
            position: absolute;
            right: 5%;
            bottom: 15%;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tv-knob {
            background: #334155;
            color: #f8fafc;
            border: 2px solid var(--tv-accent);
            padding: 8px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tv-knob:hover { background: var(--tv-accent); color: black; }

        @media (max-width: 600px) {
            .profile-container { transform: scale(0.75); height: 320px; }
            .tv-wrapper { width: 98vw; }
            #channel-info { right: 80px; font-size: 10px; }
        }
    </style>
</head>
